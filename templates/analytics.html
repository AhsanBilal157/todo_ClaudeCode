{% extends "base.html" %}

{% block title %}Analytics — Spendly{% endblock %}

{% block content %}

<section class="analytics-section">
    <div class="analytics-card">
        <div class="analytics-blob analytics-blob-tr"></div>
        <div class="analytics-blob analytics-blob-bl"></div>

        <div class="analytics-card-inner">
            <div class="analytics-icon">
                <i data-lucide="clock"></i>
            </div>

            <span class="analytics-pill">Coming soon</span>

            <h1 class="analytics-title">Advanced Analytics</h1>

            <p class="analytics-subtitle">
                We're working on powerful insights and visualizations to help you
                understand your spending patterns better.
            </p>

            <div class="analytics-dots" aria-hidden="true">
                <span class="analytics-dot"></span>
                <span class="analytics-dot"></span>
                <span class="analytics-dot"></span>
            </div>

            <p class="analytics-caption">We're crafting something special</p>
        </div>
    </div>
</section>

{% endblock %}
